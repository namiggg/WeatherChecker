name: ☁️ Hava CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    name: 🧪 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Kodu yüklə (Checkout)
        uses: actions/checkout@v4

      - name: ☕ JDK 17 quraşdır
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Maven keşini aktiv et
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 🚀 mvn test — testləri işə sal
        run: mvn test --batch-mode
        working-directory: weather-ci-project

      - name: 📊 Test hesabatını saxla
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-hesabati-${{ github.run_number }}
          path: weather-ci-project/target/surefire-reports/
          retention-days: 14